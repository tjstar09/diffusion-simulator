name: Release to PRD (Production)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy to production (e.g., rc-20250101-120000)
        required: true
        type: string
      version:
        description: Semantic version for this release (e.g., v1.0.0)
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate-inputs:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify release tag exists
        run: |
          if git rev-parse "${{ github.event.inputs.release_tag }}" >/dev/null 2>&1; then
            echo "Release tag found: ${{ github.event.inputs.release_tag }}"
          else
            echo "Release tag not found: ${{ github.event.inputs.release_tag }}"
            exit 1
          fi
      - name: Validate version format
        run: |
          if echo "${{ github.event.inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version valid: ${{ github.event.inputs.version }}"
          else
            echo "Invalid version format (expected v1.0.0): ${{ github.event.inputs.version }}"
            exit 1
          fi

  build-prod:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: validate-inputs
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pre
      - name: Build production image
        run: |
          docker build -t diffusion-sim:${{ github.event.inputs.version }} .
          echo "Production image built: diffusion-sim:${{ github.event.inputs.version }}"
      - name: Try to push to GitHub Container Registry
        continue-on-error: true
        id: push_registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag diffusion-sim:${{ github.event.inputs.version }} ghcr.io/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
          docker tag diffusion-sim:${{ github.event.inputs.version }} ghcr.io/${{ env.IMAGE_NAME }}:prd-latest
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:prd-latest
          echo "pushed=true" >> $GITHUB_OUTPUT
      - name: Registry push status
        run: |
          if [ "${{ steps.push_registry.outputs.pushed }}" = "true" ]; then
            echo "Image pushed to ghcr.io successfully"
          else
            echo "Image NOT pushed to registry (ghcr.io not configured - this is fine)"
          fi

  deploy-to-prd:
    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest
    needs: build-prod
    steps:
      - name: Deploy to Production
        run: |
          echo "DEPLOYING TO PRODUCTION"
          echo "Release Tag: ${{ github.event.inputs.release_tag }}"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Image: diffusion-sim:${{ github.event.inputs.version }}"
          echo ""
          echo "1. Pulling image"
          echo "2. Stopping current production containers"
          echo "3. Starting new containers with production config (.env.prd)"
          echo "4. Running health check..."
          echo "PRODUCTION DEPLOYMENT COMPLETE"

  smoke-test-prd:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-to-prd
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run production smoke tests
        run: python .github/workflows/scripts/smoke_test.py

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-to-prd, smoke-test-prd]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: "## Release ${{ github.event.inputs.version }}\n**Release Tag:** ${{ github.event.inputs.release_tag }}\n**Deployed to:** PRODUCTION\n### UAT Status: Approved\n### Smoke Tests: Passed\nDocker image: diffusion-sim:${{ github.event.inputs.version }}"
          draft: false
          prerelease: false