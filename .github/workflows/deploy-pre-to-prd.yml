name: Release Pipeline - PRE to PRD

on:
  push:
    branches: [ pre ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-pre:
    name: Build & Tag PRE Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t diffusion-sim:pre-latest .
      - name: Try to push to GitHub Container Registry
        continue-on-error: true
        id: push_registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag diffusion-sim:pre-latest ghcr.io/${{ env.IMAGE_NAME }}:pre-latest
          docker push ghcr.io/${{ env.IMAGE_NAME }}:pre-latest
          echo "pushed=true" >> $GITHUB_OUTPUT
      - name: Registry push status
        run: |
          if [ "${{ steps.push_registry.outputs.pushed }}" = "true" ]; then
            echo "Image pushed to ghcr.io successfully"
          else
            echo "Image NOT pushed to registry (ghcr.io not configured - this is fine)"
          fi

  deploy-to-pre:
    name: Deploy to PRE (UAT)
    runs-on: ubuntu-latest
    needs: build-pre
    steps:
      - name: Deploy to PRE environment
        run: |
          echo "Deploying to PRE (UAT) environment..."
          echo "Image: diffusion-sim:pre-latest"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "AWAITING UAT APPROVAL"
          echo "To promote to PRODUCTION:"
          echo "  1. Perform UAT on the PRE deployment"
          echo "  2. Go to GitHub Actions -> Run Release to PRD workflow"
          echo "  3. Provide the release version when prompted"

  validate-pre:
    name: Validate PRE Deployment
    runs-on: ubuntu-latest
    needs: deploy-to-pre
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run validation tests
        run: python .github/workflows/scripts/validate_pre.py

  tag-release:
    name: Tag Release Candidate
    runs-on: ubuntu-latest
    needs: validate-pre
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release candidate tag
        run: |
          TAG_NAME="rc-$(date +'%Y%m%d-%H%M%S')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release candidate $TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Created tag: $TAG_NAME"
      - name: Notify UAT required
        run: |
          echo "PRE DEPLOYMENT COMPLETE"
          echo ""
          echo "The application is now deployed to the PRE (UAT) environment."
          echo ""
          echo "NEXT STEPS:"
          echo "  1. Perform User Acceptance Testing (UAT)"
          echo "  2. If UAT PASSES -> Run Release to PRD workflow on GitHub Actions"
          echo "  3. If UAT FAILS -> Push fixes to dev branch and pipeline restarts"